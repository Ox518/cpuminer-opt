name: Build & Benchmark

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-bench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential automake autoconf libcurl4-openssl-dev \
            libssl-dev pkg-config

      - name: Enable Transparent Huge Pages (madvise)
        run: echo madvise | sudo tee /sys/kernel/mm/transparent_hugepage/enabled

      - name: Build
        run: |
          make distclean 2>/dev/null || true
          ./autogen.sh
          CFLAGS="-O3 -march=native -Wall \
            -fno-semantic-interposition \
            -fomit-frame-pointer \
            -funroll-loops \
            -fno-plt" \
            ./configure --with-curl
          make -j$(nproc)
          strip -s cpuminer 2>/dev/null || true
          echo "=== Binary size ==="
          ls -lh cpuminer

      - name: Smoke test (algo list)
        run: ./cpuminer --algo yescryptr16 --help 2>&1 | head -5 || true

      - name: Benchmark yescryptr16 (30 sec)
        run: |
          # Run in benchmark mode: connects to no pool, just hashes
          # --benchmark is the standard cpuminer-opt self-test flag
          timeout 35 ./cpuminer \
            --algo yescryptr16 \
            --benchmark \
            --threads $(nproc) \
            2>&1 | tee bench.log || true
          echo "--- hashrate lines ---"
          grep -i "kH\|MH\|hash\|speed\|accept\|yescrypt" bench.log || true

      - name: Upload bench log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-log
          path: bench.log
          retention-days: 7
